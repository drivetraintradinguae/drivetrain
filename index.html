fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+GK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:.85,maxOutputTokens:900}})}).then(function(r){return r.json()}).then(function(data){var raw=(data&&data.candidates&&data.candidates[0]&&data.candidates[0].content&&data.candidates[0].content.parts&&data.candidates[0].content.parts[0]&&data.candidates[0].content.parts[0].text)||"";var cleaned=raw.replace(/```json|```/g,"").trim();var parsed;try{parsed=JSON.parse(cleaned)}catch(err){var match=cleaned.match(/\{[\s\S]*\}/);parsed=match?JSON.parse(match[0]):{en:cleaned,ar:""}}document.getElementById("pgEn").value=parsed.en||"";document.getElementById("pgAr").value=parsed.ar||"";btn.disabled=false;btn.textContent="Regenerate Caption"}).catch(function(err){console.error("PG.generate error:",err);alert("Generation failed. Check your connection and try again.");btn.disabled=false;btn.textContent="Generate Caption (EN + AR)"})}

ctx.fillStyle="#9ca3af";ctx.textAlign="center";ctx.font="bold 28px -apple-system,BlinkMacSystemFont,sans-serif";var wm="DRIVETRAIN TRADING UAE";var wmY=350;ctx.save();ctx.translate(W/2,wmY);var letterGap=4;var totalW=0;for(var i=0;i<wm.length;i++){totalW+=ctx.measureText(wm[i]).width+(i<wm.length-1?letterGap:0)}var startX=-totalW/2;for(var j=0;j<wm.length;j++){ctx.textAlign="left";ctx.fillText(wm[j],startX,0);startX+=ctx.measureText(wm[j]).width+letterGap}ctx.restore();
