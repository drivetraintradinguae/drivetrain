function useToast() {

const dismiss = useCallback(id => setItems(p => p.filter(x => x.id !== id)), []);
return { items, toast, dismiss };
}

function Toasts({ items, dismiss }) {
return (<div style={{position:‘fixed’,top:56,right:8,zIndex:9999,display:‘flex’,flexDirection:‘column’,gap:8,fontFamily:‘Montserrat’}}>{items.map(x => (

    <div className="flex items-center gap-2 mb-3 text-red-400"><ShieldAlert size={20}/><h2 className="text-lg font-black uppercase" style={{fontFamily:"'Bebas Neue'"}}>Duplicate Alert</h2></div>
    <div className="space-y-1 mb-3 max-h-28 overflow-y-auto">{(dupI||[]).map((d,i)=><div key={i} className="flex items-center gap-2 bg-red-950 border border-red-800 rounded-lg px-3 py-1.5 text-xs text-red-300 font-bold"><AlertTriangle size={11}/>{d.engineNo}</div>)}</div>
    <div className="flex gap-2"><button onClick={()=>{setDupO(false);setPend([])}} className="flex-1 py-2 bg-gray-700 rounded-xl font-bold uppercase text-xs text-white">Discard</button><button onClick={forceAdd} className="flex-1 py-2 bg-red-700 rounded-xl font-bold uppercase text-xs text-white">Force Add</button></div>
  </Modal>

  <Modal open={stkO} onClose={()=>setStkO(false)} wide>
    <h2 className="text-lg font-black uppercase mb-3" style={{fontFamily:"'Bebas Neue'"}}>Add to {stkTarget==="invoice"?"Invoice":"Quotation"}</h2>
    <div className="space-y-1.5 overflow-y-auto" style={{maxHeight:'50vh'}}>
      {inv.filter(e=>e.status==="Available").map(e=>(<button key={e.id} onClick={()=>addStockItem(e)} className="w-full flex items-center justify-between p-3 bg-gray-800 border border-gray-700 hover:border-red-600 rounded-xl text-left">
        <div><span className="font-bold text-white text-xs">{e.brand}</span><span className="text-gray-400 ml-1.5" style={{fontSize:10}}>{e.engineNo}</span></div>
        <span className="text-red-400 font-bold text-xs">{cur.s} {e.sellingPrice?.toLocaleString()}</span>
      </button>))}
      {!inv.filter(e=>e.status==="Available").length&&<p className="text-gray-500 text-xs text-center py-6">No stock</p>}
    </div>
  </Modal>
</div>

ReactDOM.createRoot(document.getElementById(“root”)).render(<App />);
