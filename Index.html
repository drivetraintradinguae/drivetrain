<style>
*{box-sizing:border-box}body{margin:0;background:#030712;font-family:'Montserrat',sans-serif;color:#fff}
.bb{font-family:'Bebas Neue',sans-serif}.tr{transition:all 0.2s}
.pill-g{background:#14532d;color:#86efac;border:1px solid #15803d;border-radius:9999px;padding:2px 6px;font-size:8px;font-weight:700;text-transform:uppercase}
.pill-r{background:rgba(127,29,29,0.8);color:#fca5a5;border:1px solid #991b1b;border-radius:9999px;padding:2px 6px;font-size:8px;font-weight:700;text-transform:uppercase}
.inp{background:transparent;border:none;border-bottom:1px solid transparent;outline:none;color:#fff;font-size:10px;padding:2px 2px;width:100%}
.inp:hover{border-bottom-color:#4b5563}.inp:focus{border-bottom-color:#ef4444}
.inp-w{background:transparent;border:none;border-bottom:1px solid transparent;outline:none;color:#374151;font-size:10px;padding:2px;width:100%}
.inp-w:hover{border-bottom-color:#d1d5db}.inp-w:focus{border-bottom-color:#ef4444}
.btn{border:2px solid #374151;background:#111827;color:#fff;padding:6px 10px;border-radius:12px;font-size:9px;font-weight:700;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn:hover{border-color:#ef4444}.btn-r{border-color:#ef4444;background:#b91c1c}.btn-b{border-color:#3b82f6;background:#1d4ed8}
.card{background:#111827;border:2px solid #374151;border-radius:16px;padding:12px;display:flex;flex-direction:column;align-items:flex-start;gap:4px;cursor:pointer;color:#fff}
.card-a{background:#b91c1c;border-color:#ef4444}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px}
.modal-box{position:relative;background:#111827;border:2px solid #b91c1c;border-radius:24px;padding:16px;max-height:88vh;overflow-y:auto;width:100%;max-width:480px}
.modal-box.wide{max-width:768px}
.toast-c{position:fixed;top:56px;right:8px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;min-width:200px;border:1px solid}
.toast-s{background:#14532d;border-color:#16a34a;color:#bbf7d0}.toast-e{background:rgba(69,10,10,0.9);border-color:#b91c1c;color:#fecaca}.toast-w{background:rgba(113,63,18,0.9);border-color:#ca8a04;color:#fef08a}
.sidebar{position:fixed;top:0;right:0;height:100%;width:100%;max-width:320px;z-index:950;transition:transform 0.3s;background:#111827}
table{border-collapse:collapse;width:100%}th{text-align:left;font-size:8px;text-transform:uppercase;letter-spacing:0.1em;color:#6b7280;font-weight:700;padding:8px 6px}
td{padding:4px 6px}
input[type=date]{color-scheme:dark}
.spin{animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import{getFirestore,collection,doc,setDoc,deleteDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
import{getAuth,signInAnonymously}from"https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

const app=initializeApp({apiKey:“AIzaSyAKuZ8genzvb4xTZe991ABUlZqSpyxekOk”,authDomain:“drivetrain-5924f.firebaseapp.com”,projectId:“drivetrain-5924f”,storageBucket:“drivetrain-5924f.firebasestorage.app”,messagingSenderId:“179326760527”,appId:“1:179326760527:web:ac75e8800b0ba148119c3a”});
const db=getFirestore(app);
const GEMINI_KEY=“AIzaSyDeyyy8qP5MZFBB-qbiStqtNlfKsUPJSeM”;

const SEEDS=[
{id:“s1”,brand:“Toyota”,engineNo:“2GR-FE-78441”,qty:1,status:“Available”,purchasePrice:4500,sellingPrice:7200,datePurchased:“2025-11-15”,dateSold:””,supplier:“Al Futtaim Motors”},
{id:“s2”,brand:“Nissan”,engineNo:“VQ35DE-91022”,qty:1,status:“Available”,purchasePrice:3800,sellingPrice:6100,datePurchased:“2025-12-01”,dateSold:””,supplier:“Gulf Engines Co”},
{id:“s3”,brand:“BMW”,engineNo:“N55B30-44891”,qty:1,status:“Sold”,purchasePrice:6200,sellingPrice:9800,datePurchased:“2025-10-20”,dateSold:“2026-01-10”,supplier:“Euro Parts DMCC”},
{id:“s4”,brand:“Mercedes”,engineNo:“M276-DE35-55120”,qty:1,status:“Available”,purchasePrice:7100,sellingPrice:11500,datePurchased:“2026-01-05”,dateSold:””,supplier:“Al Futtaim Motors”}
];
const SUPS=[
{id:“sp1”,name:“Al Futtaim Motors”,phone:”+971-50-1234567”,email:“sales@alfuttaim.ae”},
{id:“sp2”,name:“Gulf Engines Co”,phone:”+971-55-9876543”,email:“info@gulfengines.com”},
{id:“sp3”,name:“Euro Parts DMCC”,phone:”+971-52-4561230”,email:“orders@europarts.ae”}
];

const CUR=[{c:“AED”,s:“د.إ”},{c:“USD”,s:”$”},{c:“EUR”,s:“€”},{c:“GBP”,s:“£”},{c:“SAR”,s:“﷼”}];

let state={

co:{name:“DRIVETRAIN TRADING FZ LLC”,trn:“100XXXXXXXXX”,address:“SHARJAH, UAE - INDUSTRIAL AREA 10”,phone:”+971-XX-XXXXXXX”,email:“info@drivetraintrading.com”},
cur:CUR[0],q:””,
iDt:td(),iCli:{n:””,a:””},iIt:[],iPrefix:“DT”,iNum:1,iBnk:{a:“DRIVETRAIN TRADING FZ LLC”,i:””,b:””},iTrm:“Goods sold are not returnable. Payment due 30 days.”,iAuth:””,
qDt:td(),qCli:{n:””,a:””},qIt:[],qPrefix:“QT”,qNum:1,qBnk:{a:“DRIVETRAIN TRADING FZ LLC”,i:””,b:””},qTrm:“Quotation valid 14 days. Prices subject to change.”,qAuth:””,
toasts:[],exS:null
};

function toast(msg,type=“s”){const id=uid();state.toasts.push({id,msg,type});renderToasts();setTimeout(()=>{state.toasts=state.toasts.filter(t=>t.id!==id);renderToasts()},3000)}
function renderToasts(){const c=$(”.toast-c”);if(!c)return;c.innerHTML=state.toasts.map(t=>`<div class="toast toast-${t.type}">${t.msg}<span style="cursor:pointer;margin-left:auto" onclick="this.parentElement.remove()">✕</span></div>`).join(””)}

const dbS=async(c2,id,d)=>{try{await setDoc(doc(db,c2,id),d)}catch(e){console.error(e)}};
const dbD=async(c2,id)=>{try{await deleteDoc(doc(db,c2,id))}catch(e){console.error(e)}};
const xcsv=(fn,h,rows)=>{const c=[h.join(”,”),…rows.map(r=>r.map(c2=>`"${String(c2??"").replace(/"/g,'""')}"`).join(”,”))].join(”\n”);const b=new Blob([c],{type:“text/csv”});const u=URL.createObjectURL(b);const a=document.createElement(“a”);a.href=u;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);toast(fn+” exported”)};

// Firebase init
(async()=>{
try{
await signInAnonymously(getAuth(app));
state.fb=true;toast(“Cloud connected!”);
onSnapshot(collection(db,“inventory”),snap=>{const d=snap.docs.map(x=>({id:x.id,…x.data()}));if(!d.length){SEEDS.forEach(e=>setDoc(doc(db,“inventory”,e.id),e));SUPS.forEach(s=>setDoc(doc(db,“suppliers”,s.id),s))}else{state.inv=d;render()}});
onSnapshot(collection(db,“sales”),snap=>{state.sales=snap.docs.map(x=>({id:x.id,…x.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));if(state.sales.length)state.iNum=Math.max(…state.sales.map(s=>s.invoiceNumber||0))+1;render()});
onSnapshot(collection(db,“quotes”),snap=>{state.quotes=snap.docs.map(x=>({id:x.id,…x.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));if(state.quotes.length)state.qNum=Math.max(…state.quotes.map(s=>s.quoteNumber||0))+1;render()});
render();
}catch(e){console.error(e);toast(“Offline mode”,“w”);render()}
})();

function compImg(file){return new Promise((res,rej)=>{const img=new Image();const r=new FileReader();r.onload=e=>{img.onload=()=>{const c=document.createElement(“canvas”);let w=img.width,h=img.height;if(w>1024||h>1024){if(w>h){h=Math.round(h*1024/w);w=1024}else{w=Math.round(w*1024/h);h=1024}}c.width=w;c.height=h;c.getContext(“2d”).drawImage(img,0,0,w,h);res(c.toDataURL(“image/jpeg”,0.7))};img.onerror=rej;img.src=e.target.result};r.onerror=rej;r.readAsDataURL(file)})}

async function runAI(b64){
try{
const resp=await fetch(“https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=”+GEMINI_KEY,{method:“POST”,headers:{“Content-Type”:“application/json”},body:JSON.stringify({contents:[{parts:[{text:‘Extract the engine brand, serial number, and price from this image. Return ONLY a JSON array:[{“brand”:””,“engineNo”:””,“qty”:1,“purchasePrice”:0,“sellingPrice”:0,“supplier”:“Unknown”}]’},{inlineData:{mimeType:“image/jpeg”,data:b64.split(”,”)[1]}}]}],generationConfig:{responseMimeType:“application/json”}})});
const d=await resp.json();const txt=d?.candidates?.[0]?.content?.parts?.[0]?.text||””;
const parsed=JSON.parse(txt.replace(/`json\n?/g,"").replace(/`/g,””).trim());
if(Array.isArray(parsed)&&parsed.length){
const has=new Set(state.inv.map(e=>e.engineNo?.toLowerCase()));
const nw=parsed.filter(p=>!has.has(p.engineNo?.toLowerCase())).map(p=>({id:uid(),brand:p.brand||””,engineNo:p.engineNo||””,qty:p.qty||1,status:“Available”,purchasePrice:p.purchasePrice||0,sellingPrice:p.sellingPrice||0,datePurchased:td(),dateSold:””,supplier:p.supplier||“Unknown”}));
nw.forEach(e=>{state.inv.unshift(e);dbS(“inventory”,e.id,e)});
toast(“Found “+parsed.length+” engine(s)!”);closeModal();render();
}else toast(“None found”,“e”);
}catch(e){toast(“AI error”,“e”)}
}

window.handleAIFile=async function(inp){const f=inp.files?.[0];if(!f)return;try{const b=await compImg(f);await runAI(b)}catch{toast(“Failed”,“e”)}};

function closeModal(){const m=$(”#modal”);if(m)m.remove()}
function openModal(html,wide){closeModal();const d=document.createElement(“div”);d.id=“modal”;d.className=“modal-bg”;d.onclick=e=>{if(e.target===d)closeModal()};d.innerHTML=`<div class="modal-box ${wide?"wide":""}">${html}</div>`;document.body.appendChild(d)}

window.openScan=function(){openModal(`

<h2 class="bb" style="font-size:20px;text-transform:uppercase;margin:0 0 12px">🔍 AI Scanner</h2>
<div style="display:flex;gap:4px;margin-bottom:12px">
<label class="btn btn-r" style="flex:1;justify-content:center;cursor:pointer">📷 Upload<input type="file" accept="image/*" style="display:none" onchange="handleAIFile(this)"></label>
<label class="btn btn-r" style="flex:1;justify-content:center;cursor:pointer">📸 Camera<input type="file" accept="image/*" capture="environment" style="display:none" onchange="handleAIFile(this)"></label>
</div>
<p style="font-size:10px;color:#6b7280;text-align:center">Upload or photograph engine labels to auto-add to inventory</p>
`)};

window.openStockSel=function(target){
const avail=state.inv.filter(e=>e.status===“Available”);
openModal(`<h2 class="bb" style="font-size:20px;text-transform:uppercase;margin:0 0 12px">Select Stock → ${target===“i”?“Invoice”:“Quotation”}</h2>

<div style="display:flex;flex-direction:column;gap:6px;max-height:50vh;overflow-y:auto">
${avail.length?avail.map(e=>`<button class="btn" style="justify-content:space-between;width:100%" onclick="addStockTo('${target}','${e.id}')">
<span><b>${e.brand}</b> <span style="color:#9ca3af;font-size:10px">${e.engineNo}</span></span>
<span style="color:#fca5a5">${state.cur.s} ${e.sellingPrice?.toLocaleString()}</span></button>`).join(""):"<p style='color:#6b7280;text-align:center;padding:24px'>No stock available</p>"}
</div>`,true)};

window.addStockTo=function(target,eid){
const e=state.inv.find(x=>x.id===eid);if(!e)return;
const item={id:uid(),code:e.engineNo,desc:e.brand+” Engine - “+e.engineNo,qty:e.qty||1,pr:e.sellingPrice||0,eid:target===“i”?e.id:undefined};
if(target===“i”)state.iIt.push(item);else state.qIt.push(item);
toast(“Added”);closeModal();render()};

window.setTab=function(t){state.tab=t;render()};
window.addEngine=function(){const n={id:uid(),brand:””,engineNo:””,qty:1,status:“Available”,purchasePrice:0,sellingPrice:0,datePurchased:td(),dateSold:””,supplier:””};state.inv.unshift(n);dbS(“inventory”,n.id,n);render()};
window.delEngine=function(id){state.inv=state.inv.filter(e=>e.id!==id);dbD(“inventory”,id);toast(“Deleted”);render()};
window.toggleStatus=function(id){const e=state.inv.find(x=>x.id===id);if(e){e.status=e.status===“Available”?“Sold”:“Available”;dbS(“inventory”,e.id,e);render()}};
window.updEngine=function(id,f,v){const e=state.inv.find(x=>x.id===id);if(e){e[f]=f===“qty”||f===“purchasePrice”||f===“sellingPrice”?Number(v):v;dbS(“inventory”,e.id,e)}};

window.addDocRow=function(t){const arr=t===“i”?state.iIt:state.qIt;arr.push({id:uid(),code:””,desc:””,qty:1,pr:0});render()};
window.rmDocRow=function(t,id){if(t===“i”)state.iIt=state.iIt.filter(x=>x.id!==id);else state.qIt=state.qIt.filter(x=>x.id!==id);render()};
window.updDocRow=function(t,id,f,v){const arr=t===“i”?state.iIt:state.qIt;const it=arr.find(x=>x.id===id);if(it)it[f]=f===“qty”||f===“pr”?Number(v):v};

window.saveInvoice=function(){
if(!state.iIt.length){toast(“Add items”,“e”);return}
const sub=state.iIt.reduce((s,i)=>s+(i.qty||0)*(i.pr||0),0);const total=sub+sub*0.05;
const iv={id:uid(),invoicePrefix:state.iPrefix,invoiceNumber:state.iNum,date:state.iDt,clientInfo:{name:state.iCli.n,address:state.iCli.a},items:[…state.iIt],totalAmount:total,createdAt:Date.now()};
state.sales.unshift(iv);dbS(“sales”,iv.id,iv);
state.iIt.filter(i=>i.eid).forEach(i=>{const e=state.inv.find(x=>x.id===i.eid);if(e){e.status=“Sold”;e.dateSold=state.iDt;dbS(“inventory”,e.id,e)}});
toast(“Invoice saved & stock updated!”);state.iIt=[];state.iCli={n:””,a:””};state.iNum++;render()};

window.saveQuote=function(){
if(!state.qIt.length){toast(“Add items”,“e”);return}
const sub=state.qIt.reduce((s,i)=>s+(i.qty||0)*(i.pr||0),0);const total=sub+sub*0.05;
const qt={id:uid(),quotePrefix:state.qPrefix,quoteNumber:state.qNum,date:state.qDt,clientInfo:{name:state.qCli.n,address:state.qCli.a},items:[…state.qIt],totalAmount:total,createdAt:Date.now()};
state.quotes.unshift(qt);dbS(“quotes”,qt.id,qt);
toast(“Quotation saved!”);state.qIt=[];state.qCli={n:””,a:””};state.qNum++;render()};

window.openSalesHist=function(){
const s=state.sales;
openModal(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2 class="bb" style="font-size:20px;text-transform:uppercase;margin:0">Invoice History</h2><button onclick="closeModal()" style="background:none;border:none;color:#9ca3af;font-size:18px;cursor:pointer">✕</button></div> <button class="btn" style="width:100%;justify-content:center;margin-bottom:12px" onclick="xcsv('invoices.csv',['Ref','Date','Client','Total'],${JSON.stringify(s.map(x=>[x.invoicePrefix+'-'+String(x.invoiceNumber).padStart(6,'0'),x.date,x.clientInfo?.name,x.totalAmount]))})">📥 Export Excel</button> ${s.length?s.map(x=>`<div style="background:#1f2937;border:1px solid #374151;border-radius:12px;padding:12px;margin-bottom:8px"><div style="display:flex;justify-content:space-between"><b style="font-size:12px">${x.invoicePrefix}-${String(x.invoiceNumber).padStart(6,“0”)}</b><span style="font-size:10px;color:#6b7280">${x.date}</span></div><p style="font-size:10px;color:#9ca3af;margin:2px 0">${x.clientInfo?.name||”—”}</p><p style="color:#fca5a5;font-weight:700;font-size:12px;margin:0">${state.cur.s} ${x.totalAmount?.toLocaleString()}</p></div>`).join(""):"<p style='color:#6b7280;text-align:center;padding:32px'>None yet</p>"}`)};

window.openQuoteHist=function(){

window.toggleSup=function(name){state.exS=state.exS===name?null:name;render()};
window.closeModal=closeModal;
window.xcsv=xcsv;

function docHTML(t){
const pre=t===“i”?state.iPrefix:state.qPrefix;
const num=t===“i”?state.iNum:state.qNum;
const dt=t===“i”?state.iDt:state.qDt;
const cli=t===“i”?state.iCli:state.qCli;
const items=t===“i”?state.iIt:state.qIt;
const bnk=t===“i”?state.iBnk:state.qBnk;

const isQ=t===“q”;
const accent=isQ?”#2563EB”:”#D7261E”;

const vat=sub*0.05;const grd=sub+vat;

return `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px">

<button class="btn ${isQ?"btn-b":"btn-r"}" onclick="save${isQ?"Quote":"Invoice"}()">${isQ?"💾 Save Quotation":"💾 Save & Deduct"}</button>
</div>
<div style="background:#fff;color:#111;border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,0.5)">

<div style="font-size:10px;color:#9ca3af;margin-top:4px">
<p style="margin:2px 0">TRN: <input class="inp" style="width:120px;color:#d1d5db" value="${state.co.trn}" onchange="state.co.trn=this.value"></p>
<p style="margin:2px 0">📍 <input class="inp" style="color:#d1d5db" value="${state.co.address}" onchange="state.co.address=this.value"></p>
<p style="margin:2px 0">📞 <input class="inp" style="width:160px;color:#d1d5db" value="${state.co.phone}" onchange="state.co.phone=this.value"></p>
<p style="margin:2px 0">✉️ <input class="inp" style="width:200px;color:#d1d5db" value="${state.co.email}" onchange="state.co.email=this.value"></p>
</div></div>
<div style="text-align:right">
<p class="bb" style="font-size:22px;color:${accent};margin:0">${label}</p>
<div style="display:flex;align-items:center;justify-content:flex-end;gap:4px;margin:4px 0">
<input class="inp" style="width:50px;text-align:center;background:#1f2937;border-radius:8px;padding:4px;border:1px solid #374151;color:#fff" value="${pre}" onchange="state.${t}Prefix=this.value">
<span style="color:#6b7280">-</span>
<input type="number" class="inp" style="width:70px;text-align:center;background:#1f2937;border-radius:8px;padding:4px;border:1px solid #374151;color:#fff" value="${num}" onchange="state.${t}Num=Math.max(1,+this.value)">
</div>
<input type="date" class="inp" style="background:#1f2937;border-radius:8px;padding:4px;border:1px solid #374151;width:auto;color:#fff" value="${dt}" onchange="state.${t}Dt=this.value">
<select class="inp" style="background:#1f2937;border-radius:8px;padding:4px;border:1px solid #374151;width:auto;color:#fff;margin-top:4px" onchange="state.cur=CUR.find(c=>c.c===this.value);render()">
${CUR.map(c=>`<option value="${c.c}" ${c.c===state.cur.c?"selected":""}>${c.c} (${c.s})</option>`).join("")}
</select>
</div></div></div>
<div style="padding:12px 16px;border-bottom:1px solid #e5e7eb">
<p style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;color:#6b7280;margin:0 0 4px">Bill To</p>
<input class="inp-w" style="font-size:14px;font-weight:700;color:#111" placeholder="Client Name" value="${cli.n}" onchange="state.${t}Cli.n=this.value">
<textarea class="inp-w" style="font-size:12px;resize:none;color:#4b5563" placeholder="Address" rows="2" onchange="state.${t}Cli.a=this.value">${cli.a}</textarea>
</div>
<div style="padding:8px 16px">
<table><thead><tr style="border-bottom:2px solid #111"><th>Code</th><th>Description</th><th>Q</th><th>Price</th><th>Total</th><th></th></tr></thead><tbody>
${items.map(it=>`<tr style="border-bottom:1px solid #e5e7eb">
<td><input class="inp-w" style="font-family:monospace;font-size:9px" value="${it.code}" onchange="updDocRow('${t}','${it.id}','code',this.value)"></td>
<td><input class="inp-w" value="${it.desc}" onchange="updDocRow('${t}','${it.id}','desc',this.value)"></td>
<td><input type="number" class="inp-w" style="width:32px;text-align:center" value="${it.qty}" onchange="updDocRow('${t}','${it.id}','qty',this.value);render()"></td>
<td><input type="number" class="inp-w" style="width:64px" value="${it.pr}" onchange="updDocRow('${t}','${it.id}','pr',this.value);render()"></td>
<td style="font-weight:700;font-size:10px">${state.cur.s} ${((it.qty||0)*(it.pr||0)).toLocaleString()}</td>
<td><button onclick="rmDocRow('${t}','${it.id}')" style="background:none;border:none;color:#9ca3af;cursor:pointer">✕</button></td>
</tr>`).join("")}
${!items.length?`<tr><td colspan="6" style="text-align:center;padding:24px;color:#9ca3af;font-size:10px">Add items from stock or custom</td></tr>`:""}
</tbody></table></div>
<div style="padding:8px 16px;display:flex;justify-content:flex-end"><div style="width:176px;font-size:11px">
<div style="display:flex;justify-content:space-between"><span style="color:#6b7280">Subtotal</span><span style="font-weight:700">${state.cur.s} ${sub.toLocaleString()}</span></div>
<div style="display:flex;justify-content:space-between"><span style="color:#6b7280">VAT 5%</span><span style="font-weight:700">${state.cur.s} ${vat.toLocaleString()}</span></div>
<div style="display:flex;justify-content:space-between;border-top:2px solid #111;padding-top:4px;margin-top:4px"><span style="font-weight:900;text-transform:uppercase;font-size:10px">Total</span><span style="font-weight:900;font-size:14px;color:${accent}">${state.cur.s} ${grd.toLocaleString()}</span></div>
</div></div>
<div style="padding:12px 16px;background:#f9fafb;border-top:1px solid #e5e7eb;display:grid;grid-template-columns:1fr 1fr;gap:12px">
<div><p style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;color:#6b7280;margin:0 0 4px">Bank Details</p><div style="font-size:10px">
<p style="margin:2px 0">Account: <input class="inp-w" style="width:140px" value="${bnk.a}" onchange="state.${t}Bnk.a=this.value"></p>
<p style="margin:2px 0">IBAN: <input class="inp-w" style="width:192px" value="${bnk.i}" onchange="state.${t}Bnk.i=this.value" placeholder="AE00 0000 0000 0000"></p>
<p style="margin:2px 0">Bank: <input class="inp-w" style="width:140px" value="${bnk.b}" onchange="state.${t}Bnk.b=this.value" placeholder="Emirates NBD"></p>
</div></div>
<div><p style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;color:#6b7280;margin:0 0 4px">Payment Terms</p>
<textarea class="inp-w" style="resize:none;border:1px solid #d1d5db;border-radius:8px;padding:6px" rows="3" onchange="state.${t}Trm=this.value">${trm}</textarea></div>
</div>
<div style="padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:16px">
<div><div style="border-bottom:2px solid #d1d5db;height:40px"></div><p style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;color:#6b7280;margin:4px 0 0">Customer Signature</p></div>
<div><div style="border-bottom:2px solid #d1d5db;height:40px"></div><input class="inp-w" style="font-size:9px;margin-top:4px" placeholder="Authorized Signatory Name & Title" value="${auth}" onchange="state.${t}Auth=this.value"></div>
</div>
</div>`;
}

function render(){
const inv=state.inv;
const flt=inv.filter(e=>{const l=state.q.toLowerCase();return !l||[e.brand,e.engineNo,e.supplier].some(f=>f?.toLowerCase().includes(l))});
const tU=inv.length,aU=inv.filter(e=>e.status===“Available”).length;
const pr=inv.reduce((s,e)=>s+((e.sellingPrice||0)-(e.purchasePrice||0))*(e.qty||1),0);

const agS={};inv.forEach(e=>{const k=(e.supplier||”?”).trim().toLowerCase();if(!agS[k])agS[k]={name:e.supplier||”?”,eng:[],ph:””,em:””};agS[k].eng.push(e)});
state.sups.forEach(s=>{const k=s.name.trim().toLowerCase();if(!agS[k])agS[k]={name:s.name,eng:[],ph:s.phone,em:s.email};else{agS[k].ph=agS[k].ph||s.phone;agS[k].em=agS[k].em||s.email}});
const supList=Object.values(agS);

const root=$(”#root”);
root.innerHTML=`

<div class="toast-c"></div>
<header style="position:sticky;top:0;z-index:50;background:rgba(3,7,18,0.95);backdrop-filter:blur(8px);border-bottom:2px solid #b91c1c;padding:8px">
<div style="max-width:1024px;margin:0 auto;display:flex;align-items:center;justify-content:space-between">
<div style="display:flex;align-items:center;gap:8px">
<div style="width:32px;height:32px;background:#b91c1c;border-radius:12px;display:flex;align-items:center;justify-content:center">⚡</div>
<div><h1 class="bb" style="font-size:17px;margin:0;text-transform:uppercase">DRIVETRAIN</h1>
<div style="display:flex;align-items:center;gap:4px"><span style="font-size:7px;color:#6b7280;text-transform:uppercase;letter-spacing:0.15em;font-weight:700">Suite</span><span style="width:6px;height:6px;border-radius:50%;background:${state.fb?"#22c55e":"#eab308"}"></span></div></div>
</div>
<nav style="display:flex;gap:2px">
${[["inventory","📦","Stock"],["invoicing","📄","Invoice"],["quotation","📋","Quote"],["suppliers","🚛","Supply"]].map(([k,ic,l])=>`<button onclick="setTab('${k}')" style="display:flex;align-items:center;gap:4px;padding:6px 8px;border-radius:8px;border:none;font-size:8px;font-weight:700;text-transform:uppercase;cursor:pointer;background:${state.tab===k?"#b91c1c":"transparent"};color:${state.tab===k?"#fff":"#9ca3af"}">${ic} ${l}</button>`).join("")}
</nav>
<div style="display:flex;gap:2px">
<button onclick="openSalesHist()" style="padding:6px;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:14px">📜</button>
<button onclick="xcsv('inventory.csv',['Brand','EngineNo','QTY','Status','Buy','Sell','Supplier'],state.inv.map(e=>[e.brand,e.engineNo,e.qty,e.status,e.purchasePrice,e.sellingPrice,e.supplier]))" style="padding:6px;background:none;border:none;color:#9ca3af;cursor:pointer;font-size:14px">📥</button>
</div></div></header>

<main style="max-width:1024px;margin:0 auto;padding:12px">
${state.tab==="inventory"?`
<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px">
<div class="card card-a" onclick="openScan()"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">AI Scan</span><span class="bb" style="font-size:24px">SCAN</span></div>
<div class="card"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">Total</span><span class="bb" style="font-size:24px">${tU}</span></div>
<div class="card"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">Available</span><span class="bb" style="font-size:24px">${aU}</span></div>
<div class="card"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">Profit</span><span class="bb" style="font-size:24px">${state.cur.s}${pr.toLocaleString()}</span></div>
</div>
<div style="display:flex;gap:6px;margin-bottom:12px">
<input class="inp" style="flex:1;background:#111827;border:2px solid #374151;border-radius:12px;padding:8px 12px;font-size:12px" placeholder="🔍 Search..." value="${state.q}" oninput="state.q=this.value;render()">
<button class="btn btn-r" onclick="addEngine()">➕</button>
</div>
<div style="overflow-x:auto;border:2px solid #374151;border-radius:12px">
<table><thead><tr style="background:#111827;border-bottom:2px solid #374151"><th>Brand</th><th>Engine No</th><th>Q</th><th>Status</th><th>Buy</th><th>Sell</th><th>Date</th><th>Supplier</th><th></th></tr></thead><tbody>
${flt.map(e=>`<tr style="border-bottom:1px solid #1f2937">
<td><input class="inp" value="${e.brand}" onchange="updEngine('${e.id}','brand',this.value)"></td>
<td><input class="inp" style="font-family:monospace;font-size:9px" value="${e.engineNo}" onchange="updEngine('${e.id}','engineNo',this.value)"></td>
<td><input type="number" class="inp" style="width:28px;text-align:center" value="${e.qty}" onchange="updEngine('${e.id}','qty',this.value)"></td>
<td><button onclick="toggleStatus('${e.id}')" class="${e.status==="Available"?"pill-g":"pill-r"}">${e.status}</button></td>
<td><input type="number" class="inp" style="width:56px" value="${e.purchasePrice}" onchange="updEngine('${e.id}','purchasePrice',this.value)"></td>
<td><input type="number" class="inp" style="width:56px" value="${e.sellingPrice}" onchange="updEngine('${e.id}','sellingPrice',this.value)"></td>
<td><input type="date" class="inp" style="font-size:9px;color:#9ca3af" value="${e.datePurchased}" onchange="updEngine('${e.id}','datePurchased',this.value)"></td>
<td><input class="inp" style="color:#9ca3af" value="${e.supplier}" onchange="updEngine('${e.id}','supplier',this.value)"></td>
<td><button onclick="delEngine('${e.id}')" style="background:none;border:none;color:#4b5563;cursor:pointer">🗑️</button></td>
</tr>`).join("")}
${!flt.length?'<tr><td colspan="9" style="text-align:center;padding:32px;color:#4b5563">No engines</td></tr>':""}
</tbody></table></div>
`:""}

${state.tab===“invoicing”?docHTML(“i”):””}

${state.tab===“quotation”?`

<div style="display:flex;justify-content:flex-end;margin-bottom:8px">
<button class="btn" onclick="openQuoteHist()">📜 Quote History</button>
</div>${docHTML("q")}`:""}

${state.tab===“suppliers”?`

<div style="margin-bottom:12px"><input class="inp" style="background:#111827;border:2px solid #374151;border-radius:12px;padding:8px 12px;font-size:12px;width:100%" placeholder="🔍 Search suppliers..." oninput="state.supQ=this.value;render()"></div>
<div style="display:flex;flex-direction:column;gap:8px">
${supList.filter(s=>!state.supQ||s.name.toLowerCase().includes(state.supQ?.toLowerCase()||"")).map(s=>`
<div style="background:#111827;border:2px solid #374151;border-radius:16px;overflow:hidden">
<button onclick="toggleSup('${s.name}')" style="width:100%;display:flex;align-items:center;justify-content:space-between;padding:12px;background:none;border:none;color:#fff;cursor:pointer;text-align:left">
<div style="display:flex;align-items:center;gap:8px">
<div style="width:32px;height:32px;background:#b91c1c;border-radius:12px;display:flex;align-items:center;justify-content:center">🏢</div>
<div><h3 style="font-weight:700;text-transform:uppercase;font-size:12px;margin:0">${s.name}</h3>
<div style="display:flex;gap:8px;margin-top:2px;font-size:9px;color:#6b7280">${s.ph?"📞 "+s.ph:""}${s.em?" ✉️ "+s.em:""}</div></div></div>
<div style="display:flex;align-items:center;gap:6px"><span class="bb" style="font-size:18px">${s.eng.length}</span><span>${state.exS===s.name?"▲":"▼"}</span></div>
</button>
${state.exS===s.name&&s.eng.length?`<div style="border-top:1px solid #1f2937;padding:0 12px 8px">
<table style="margin-top:4px"><thead><tr style="border-bottom:1px solid #1f2937"><th>Model</th><th>Serial</th><th>Price</th><th>Status</th></tr></thead><tbody>
${s.eng.map(e=>`<tr style="border-bottom:1px solid rgba(31,41,55,0.5)"><td style="font-weight:700;font-size:9px">${e.brand}</td><td style="color:#9ca3af;font-family:monospace;font-size:9px">${e.engineNo}</td><td style="color:#9ca3af;font-size:9px">${state.cur.s} ${e.purchasePrice?.toLocaleString()}</td><td><span class="${e.status==="Available"?"pill-g":"pill-r"}">${e.status}</span></td></tr>`).join("")}
</tbody></table></div>`:""}
</div>`).join("")}
${!supList.length?'<p style="text-align:center;padding:40px;color:#4b5563;font-size:12px">No suppliers</p>':""}
</div>`:""}
</main>`;
renderToasts();
}

window.state=state;window.CUR=CUR;window.render=render;
</script>

</body>
</html>
