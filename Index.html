if(S.tab===“inventory”){
html+=’<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px"><div class="card cardA" onclick="openScan()"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">AI Scan</span><span class="bb" style="font-size:24px">SCAN</span></div><div class="card"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">Total</span><span class="bb" style="font-size:24px">’+tU+’</span></div><div class="card"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">Available</span><span class="bb" style="font-size:24px">’+aU+’</span></div><div class="card"><span style="font-size:8px;text-transform:uppercase;letter-spacing:0.1em;font-weight:700;opacity:0.7">Profit</span><span class="bb" style="font-size:24px">’+S.cur.s+pr.toLocaleString()+’</span></div></div>’;
